name: ci

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.4"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Product gate
        run: make check
