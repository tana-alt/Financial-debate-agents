name: ci

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.4"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Required checks
        run: make check-required
