name: ci

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.4"

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Ruff
        run: uv run ruff check .

  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.4"

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Mypy
        run: uv run mypy apps src tests

  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.4"

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Pytest
        run: uv run pytest

  architecture-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.4"

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Architecture Check
        run: uv run python -m src.services.verification.cli architecture
