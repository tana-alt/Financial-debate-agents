specialist_default:
  allowed_surface_classes:
    - input_docs
    - output_docs
    - common_skill_agents_md
    - skill_docs
    - packet_templates_named_by_handoff
    - compact_lesson_packet_named_by_handoff
  denied_by_default:
    - AGENTS.md
    - ARCHITECTURE.md
    - docs/agent-map.md
    - obsidian-vault/Apps/{app_slug}/11-agent-map.md
    - obsidian-vault/Apps/{app_slug}/12-agent-evals.md
    - broad_repo_history
    - archive
    - all_runtime_maps
    - long_logs
  escalation_rule: "If missing context blocks execution, emit a rework_packet or ask main_lane/steward for a scoped handoff instead of self-expanding."
  common_skill_agents_md: skills/AGENTS.md
  compact_lesson_packet: projects/{project_id}/artifacts/runtime/latest-lessons.yaml
