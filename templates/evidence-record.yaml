schema_version: "0.1"
record_type: evidence_record
status: draft

identity:
  evidence_id: example_evidence_id
  work_id: example_work_id
  project_id: example_project
  created_at: "YYYY-MM-DD"

sources:
  source_refs:
    - path: "docs/02-output-verification-contract.md"
  commands: []
  screenshots: []
  external_refs: []

change:
  changed_paths: []
  artifact_refs:
    - "artifact/example-output.md"

verification_summary:
  attempted:
    - name: "foundation robustness gate"
      command: "make check-foundation"
      result: passed
  result: passed
  unverified_surfaces:
    - "none"

human_gate:
  required: false
  status: not_applicable
  reason: "template example"

observations:
  facts:
    - "Observed fact with source ref."
  inferences:
    - "Inference explicitly marked as inference."
  decisions:
    - "Decision made from the evidence."

limits:
  missing_evidence: []
  stale_refs: []
  confidence: low
  residual_risk:
    - "none"
