[project]
name = "foundation-development"
version = "0.1.0"
description = "Small agent foundation docs and verification checks"
readme = "README.md"
requires-python = ">=3.12,<3.15"
dependencies = []

[dependency-groups]
dev = [
    "mypy>=1.15.0",
    "pytest>=8.3.0",
    "ruff>=0.11.0",
]

[tool.uv]
package = false

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "B",
    "UP",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.mypy]
python_version = "3.12"
strict = true
files = ["tests"]
warn_redundant_casts = true
warn_unused_configs = true
warn_unused_ignores = true
